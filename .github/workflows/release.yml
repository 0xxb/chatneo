name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  MACOSX_DEPLOYMENT_TARGET: '10.15'

jobs:
  release-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-directories: ~/Library/Caches/sherpa-rs

      - name: Pin CMake 3.x
        run: |
          brew uninstall --ignore-dependencies cmake
          pip3 install --break-system-packages cmake==3.31.6

      - name: Pin Xcode 16.2 (ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        run: SHERPA_BUILD_SHARED_LIBS=0 pnpm tauri build --target ${{ matrix.target }}
        env:
          CMAKE_OSX_DEPLOYMENT_TARGET: '10.15'

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/dmg/*.dmg

  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-directories: ~/AppData/Local/sherpa-rs

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri build
        env:
          SHERPA_BUILD_SHARED_LIBS: '1'

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  publish:
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/release-publish.sh
            public/CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release-publish.sh "${{ github.ref_name }}" artifacts
