name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-directories: |
            ~/Library/Caches/sherpa-rs
            ~/AppData/Local/sherpa-rs

      - name: Pin CMake 3.x (macOS)
        if: runner.os == 'macOS'
        run: |
          brew uninstall --ignore-dependencies cmake
          pip3 install --break-system-packages cmake==3.31.6

      - name: Pin Xcode 16.2 (macOS ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install frontend dependencies
        run: pnpm install

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=""
          if [ -f public/CHANGELOG.md ]; then
            # Extract content between ### $TAG and the next ### heading
            NOTES=$(awk "/^### ${TAG//./\\.}\$/{found=1; next} /^### /{found=0} found" public/CHANGELOG.md)
          fi
          # Write multiline output
          {
            echo "body<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SHERPA_BUILD_SHARED_LIBS: ${{ runner.os == 'Windows' && '1' || '0' }}
          MACOSX_DEPLOYMENT_TARGET: '10.15'
          CMAKE_OSX_DEPLOYMENT_TARGET: '10.15'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ChatNeo ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
